{% extends "base.html" %}

{% block content %}
  <h2>📝 My Daily To-Do</h2>
  
  <form method="POST" action="/add">
    <input type="text" name="task" placeholder="Buy groceries..." required>
    <button type="submit">+ Add Task</button>
  </form>

  <ul>
    {% for todo in tasks %}
      <li>
        {{ todo.task }}
        <a href="/delete/{{ todo.id }}">Delete</a>
      </li>
    {% endfor %}
  </ul>

  {% if not todos %}
    <p>No tasks yet. Add one above!</p>
  {% endif %}
{% endblock %}
